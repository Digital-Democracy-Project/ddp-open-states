# INTERIM stopgap (rollback artifact) — api-v3 against the EXISTING CAMS Postgres (:5432).
# Superseded by docker-compose.ddp.yml (dedicated Postgres). Kept as the one-command rollback
# during the soak period; retire once the cutover is confirmed stable.
name: ddp-openstates-stopgap

services:
  api:
    build:
      context: ../api-v3
      dockerfile: ../deploy/Dockerfile.ddp
    image: ddp-openstates-api:local
    container_name: ddp-openstates-api-stopgap
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://openstates:openstates_dev@ddp-agents-postgres-1:5432/openstates"
      RRL_REDIS_HOST: "ddp-agents-redis-1"
      RRL_REDIS_PORT: "6379"
      RRL_REDIS_DB: "1"
      WEB_CONCURRENCY: "3"
      FORWARDED_ALLOW_IPS: "*"
    ports:
      - "0.0.0.0:8002:80"
    networks:
      - ddp-agents_default
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:80/healthz', timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

networks:
  ddp-agents_default:
    external: true
